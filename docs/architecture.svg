<svg viewBox="0 0 1000 818" xmlns="http://www.w3.org/2000/svg" font-family="IBM Plex Sans, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#5b6b65"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1000" height="818" fill="#eef1ea"/>

  <!-- Title -->
  <text x="30" y="42" font-family="Georgia, 'Times New Roman', serif" font-size="28" font-weight="600" fill="#1c2b27">MedSentry — Multi-Agent Architecture</text>
  <text x="30" y="64" font-size="13" fill="#5b6b65" font-style="italic">Google ADK  ·  MCP  ·  Concierge Agents track  ·  demo_engine.py mirrors agents.py 1:1</text>

  <!-- Row 1: Entry points -->
  <g>
    <rect x="20" y="85" width="300" height="66" rx="12" fill="#2f5d53"/>
    <text x="170" y="112" text-anchor="middle" font-size="14" font-weight="600" fill="#fbfaf5">Agents CLI</text>
    <text x="170" y="132" text-anchor="middle" font-size="11.5" fill="#d3dcd3">app/cli.py · one command per Skill</text>

    <rect x="350" y="85" width="300" height="66" rx="12" fill="#2f5d53"/>
    <text x="500" y="112" text-anchor="middle" font-size="14" font-weight="600" fill="#fbfaf5">Web Dashboard</text>
    <text x="500" y="132" text-anchor="middle" font-size="11.5" fill="#d3dcd3">app/web.py (FastAPI) + static UI</text>

    <rect x="680" y="85" width="300" height="66" rx="12" fill="#1f413a"/>
    <text x="830" y="106" text-anchor="middle" font-size="14" font-weight="600" fill="#fbfaf5">External MCP Clients</text>
    <text x="830" y="124" text-anchor="middle" font-size="11" fill="#d3dcd3">Claude Desktop, Claude Code,</text>
    <text x="830" y="139" text-anchor="middle" font-size="11" fill="#d3dcd3">Gemini CLI, teammates' agents…</text>
  </g>

  <line x1="170" y1="151" x2="170" y2="180" stroke="#5b6b65" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="500" y1="151" x2="500" y2="180" stroke="#5b6b65" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="830" y1="151" x2="830" y2="180" stroke="#5b6b65" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Row 2: Orchestration -->
  <rect x="20" y="182" width="630" height="150" rx="14" fill="#fbfaf5" stroke="#2f5d53" stroke-width="1.5"/>
  <text x="335" y="205" text-anchor="middle" font-size="13" font-weight="600" fill="#2f5d53" letter-spacing="0.04em">MEDSENTRYORCHESTRATOR — ADK LlmAgent (root)</text>
  <text x="335" y="221" text-anchor="middle" font-size="10.5" fill="#5b6b65">app/agents.py (live, Gemini) ⇄ app/demo_engine.py (deterministic, zero-setup default)</text>

  <rect x="40" y="232" width="330" height="82" rx="10" fill="#f1e4c8" stroke="#b8862b"/>
  <text x="205" y="250" text-anchor="middle" font-size="12" font-weight="600" fill="#7a5a1e">IntakePipeline — SequentialAgent</text>
  <text x="205" y="270" text-anchor="middle" font-size="11" fill="#5b3f16">IntakeAgent → SafetyAgent → SchedulerAgent</text>
  <text x="205" y="288" text-anchor="middle" font-size="10" fill="#7a5a1e" font-style="italic">fixed order, always — never skippable</text>
  <text x="205" y="304" text-anchor="middle" font-size="10" fill="#7a5a1e">(AgentTool)</text>

  <rect x="390" y="232" width="240" height="82" rx="10" fill="#f1e4c8" stroke="#b8862b"/>
  <text x="510" y="256" text-anchor="middle" font-size="12" font-weight="600" fill="#7a5a1e">CaregiverLiaisonAgent</text>
  <text x="510" y="276" text-anchor="middle" font-size="10.5" fill="#5b3f16">invoked on demand, never</text>
  <text x="510" y="291" text-anchor="middle" font-size="10.5" fill="#5b3f16">automatically — consent-gated</text>
  <text x="510" y="308" text-anchor="middle" font-size="10" fill="#7a5a1e">(AgentTool)</text>

  <rect x="680" y="182" width="300" height="150" rx="14" fill="#fbfaf5" stroke="#1f413a" stroke-width="1.5"/>
  <text x="830" y="212" text-anchor="middle" font-size="13" font-weight="600" fill="#1f413a">MCP SERVER</text>
  <text x="830" y="230" text-anchor="middle" font-size="10.5" fill="#5b6b65">app/mcp_server.py — FastMCP</text>
  <text x="830" y="252" text-anchor="middle" font-size="10.5" fill="#1c2b27">Exposes the stateless safety tools</text>
  <text x="830" y="267" text-anchor="middle" font-size="10.5" fill="#1c2b27">to ANY MCP client — bypasses</text>
  <text x="830" y="282" text-anchor="middle" font-size="10.5" fill="#1c2b27">the orchestrator entirely.</text>
  <text x="830" y="303" text-anchor="middle" font-size="10" fill="#a13d2b" font-style="italic">consent/audit tools deliberately NOT exposed here</text>

  <line x1="335" y1="332" x2="335" y2="360" stroke="#5b6b65" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="830" y1="332" x2="830" y2="360" stroke="#5b6b65" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Row 3: Shared tool layer -->
  <rect x="20" y="362" width="960" height="82" rx="14" fill="#2f5d53"/>
  <text x="500" y="382" text-anchor="middle" font-size="13" font-weight="600" fill="#fbfaf5" letter-spacing="0.04em">SHARED TOOL LAYER — app/tools.py (one implementation, reused by all three entry points above)</text>
  <text x="500" y="402" text-anchor="middle" font-size="10" fill="#d3dcd3">parse_medication_text · check_drug_interactions · build_medication_schedule</text>
  <text x="500" y="418" text-anchor="middle" font-size="10" fill="#d3dcd3">lookup_medication_info · share_caregiver_update · get_audit_log</text>
  <text x="500" y="434" text-anchor="middle" font-size="9.5" fill="#b8862b">behavior contracts documented in skills/*/SKILL.md</text>

  <line x1="500" y1="444" x2="500" y2="472" stroke="#5b6b65" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Row 4: Security layer -->
  <rect x="20" y="474" width="960" height="118" rx="14" fill="#fbfaf5" stroke="#a13d2b" stroke-width="1.5"/>
  <text x="500" y="496" text-anchor="middle" font-size="13" font-weight="600" fill="#a13d2b" letter-spacing="0.04em">SECURITY &amp; TRUST LAYER — app/security.py (every tool call passes through here first)</text>

  <g font-size="10.5" fill="#1c2b27">
    <rect x="40" y="510" width="145" height="66" rx="8" fill="#f3ded9"/>
    <text x="112" y="534" text-anchor="middle" font-weight="600">Encryption</text>
    <text x="112" y="549" text-anchor="middle" font-size="9.5">Fernet/AES</text>
    <text x="112" y="562" text-anchor="middle" font-size="9.5">at rest</text>

    <rect x="197" y="510" width="145" height="66" rx="8" fill="#f3ded9"/>
    <text x="269" y="534" text-anchor="middle" font-weight="600">RBAC</text>
    <text x="269" y="549" text-anchor="middle" font-size="9.5">least-privilege</text>
    <text x="269" y="562" text-anchor="middle" font-size="9.5">per role/scope</text>

    <rect x="354" y="510" width="145" height="66" rx="8" fill="#f3ded9"/>
    <text x="426" y="534" text-anchor="middle" font-weight="600">Consent gate</text>
    <text x="426" y="549" text-anchor="middle" font-size="9.5">fail-closed on</text>
    <text x="426" y="562" text-anchor="middle" font-size="9.5">caregiver sharing</text>

    <rect x="511" y="510" width="145" height="66" rx="8" fill="#f3ded9"/>
    <text x="583" y="534" text-anchor="middle" font-weight="600">PII redaction</text>
    <text x="583" y="549" text-anchor="middle" font-size="9.5">names/DOB/phone</text>
    <text x="583" y="562" text-anchor="middle" font-size="9.5">stripped from logs</text>

    <rect x="668" y="510" width="145" height="66" rx="8" fill="#f3ded9"/>
    <text x="740" y="534" text-anchor="middle" font-weight="600">Audit trail</text>
    <text x="740" y="549" text-anchor="middle" font-size="9.5">every call logged,</text>
    <text x="740" y="562" text-anchor="middle" font-size="9.5">allow or deny</text>

    <rect x="825" y="510" width="135" height="66" rx="8" fill="#f3ded9"/>
    <text x="892" y="534" text-anchor="middle" font-weight="600">Sanitization</text>
    <text x="892" y="549" text-anchor="middle" font-size="9.5">prompt-injection</text>
    <text x="892" y="562" text-anchor="middle" font-size="9.5">guardrail</text>
  </g>

  <line x1="500" y1="592" x2="500" y2="620" stroke="#5b6b65" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Row 5: Data layer -->
  <rect x="20" y="622" width="470" height="60" rx="12" fill="#d3dcd3"/>
  <text x="255" y="646" text-anchor="middle" font-size="12" font-weight="600" fill="#1c2b27">data/interactions.json</text>
  <text x="255" y="664" text-anchor="middle" font-size="10.5" fill="#3f4d48">curated interaction dataset (swap for a licensed clinical API in production)</text>

  <rect x="510" y="622" width="470" height="60" rx="12" fill="#d3dcd3"/>
  <text x="745" y="646" text-anchor="middle" font-size="12" font-weight="600" fill="#1c2b27">Encrypted SQLite</text>
  <text x="745" y="664" text-anchor="middle" font-size="10.5" fill="#3f4d48">patient records — every field encrypted before write (app/storage.py)</text>

  <line x1="500" y1="682" x2="500" y2="710" stroke="#5b6b65" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Row 6: Deployability -->
  <rect x="20" y="712" width="960" height="70" rx="14" fill="#1f413a"/>
  <text x="500" y="738" text-anchor="middle" font-size="13" font-weight="600" fill="#fbfaf5" letter-spacing="0.04em">DEPLOYABILITY</text>
  <text x="500" y="760" text-anchor="middle" font-size="10.5" fill="#d3dcd3">Dockerfile → Cloud Run / GKE  ·  GitHub Actions CI (lint + pytest)  ·  /health readiness probe  ·  12-factor env config</text>

  <text x="500" y="802" text-anchor="middle" font-size="10" fill="#5b6b65">Kaggle · AI Agents Intensive Vibe Coding Capstone — Concierge Agents track</text>
</svg>
