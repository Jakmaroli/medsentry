name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # google-adk is only needed for live mode; CI runs the demo/offline
          # path, so we skip it here to keep CI fast and dependency-light.
          grep -v "^google-adk" requirements.txt > requirements.ci.txt
          pip install -r requirements.ci.txt

      - name: Run tests (offline/demo path — no API key required)
        env:
          MEDSENTRY_DEMO_MODE: "true"
        run: pytest tests/ -v

      - name: Smoke-test the CLI
        env:
          MEDSENTRY_DEMO_MODE: "true"
        run: python -m app.cli run
